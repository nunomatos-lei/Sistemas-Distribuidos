server:
  port: ${PORT}

spring:
  application:
    name: "notification-service-a22302691-a22306389"

  datasource:
    url: jdbc:postgresql://${POSTGRES_DB}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    producer:
      bootstrap-servers: kafka:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: kafka:9092
      group-id: reservation-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
        spring.json.value.default.type: pt.ulusofona.cd.projeto.dto.MessageEnvelope
    listener:
      missing-topics-fatal: false
      ack-mode: MANUAL_IMMEDIATE

notification:
  events:
    restaurant-notified-events: restaurant-notified-events

reservation:
  events:
    reservation-created-events: reservation-created-events
    reservation-confirmed-events: reservation-confirmed-events
    reservation-canceled-events: reservation-canceled-events

springdoc:
  swagger-ui:
    operations-sorter: method